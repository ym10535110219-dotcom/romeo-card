<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Romeo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;
background:radial-gradient(circle,#24325f 0%,#101827 60%,#060b14 100%);
font-family:serif;position:relative;
}
.moon{
position:absolute;width:500px;height:500px;border-radius:50%;
background:radial-gradient(circle,rgba(255,245,210,.45),rgba(255,245,210,.12),transparent 72%);
left:50%;top:50%;transform:translate(-50%,-50%);
animation:moon 120s linear infinite;
}
@keyframes moon{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.star{position:absolute;border-radius:50%;background:white;animation:star 20s linear infinite}
@keyframes star{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}
.card-scene{perspective:2200px;position:relative;z-index:5}
.card-wrap{width:min(88vw,430px);aspect-ratio:2/3;position:relative}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;cursor:pointer;animation:float 4s ease-in-out infinite;}
@keyframes float{50%{transform:translateY(-10px)}}
.face{position:absolute;inset:0;border-radius:24px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.face img{width:100%;height:100%;object-fit:cover}
.front{transform:rotateY(180deg)}
.back{animation:glow 3s ease-in-out infinite;}
@keyframes glow{50%{box-shadow:0 0 40px rgba(255,220,120,.7),0 0 100px rgba(255,220,120,.25)}}
.flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none}
.gold{position:absolute;width:5px;height:5px;border-radius:50%;background:#ffd76a;box-shadow:0 0 12px #ffd76a;pointer-events:none;}
</style>
</head>
<body>

<div class="moon"></div>
<div id="flash" class="flash"></div>

<div class="card-scene">
  <div class="card-wrap">
    <div id="card" class="card">
      <div class="face back"><img src="card-back.png"></div>
      <div class="face front"><img id="frontImage" src=""></div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const cardId = params.get('card') || '001';
document.getElementById('frontImage').src = 'cards/' + cardId + '.png';

for(let i=0;i<120;i++){
 let s=document.createElement('div');
 s.className='star';
 let z=Math.random()*3+1;
 s.style.width=z+'px'; s.style.height=z+'px';
 s.style.left=Math.random()*100+'vw';
 s.style.top=Math.random()*100+'vh';
 s.style.opacity=Math.random();
 s.style.animationDuration=(15+Math.random()*20)+'s';
 document.body.appendChild(s);
}

const card=document.getElementById('card');
const flash=document.getElementById('flash');
let open=false;

card.onclick=async()=>{
 if(open) return;
 open=true;
 card.style.pointerEvents='none';

 await animateCard([
  'translateY(0px) scale(1) rotateY(0deg)',
  'translateY(-35px) scale(1.08) rotateY(0deg)'
 ],350);

 burst();

 await animateCard([
  'translateY(-35px) scale(1.08) rotateZ(0deg) rotateY(0deg)',
  'translateY(-35px) scale(1.08) rotateZ(360deg) rotateY(0deg)'
 ],800);

 flash.animate([{opacity:0},{opacity:.85},{opacity:0}],{duration:450});

 await animateCard([
  'translateY(-35px) scale(1.08) rotateY(0deg)',
  'translateY(0px) scale(1) rotateY(180deg)'
 ],900);

 card.style.animation='none';
card.style.transform='rotateY(180deg)';
goldRain();
};

function animateCard(frames,duration){
 return new Promise(resolve=>{
  const a=card.animate(frames.map(v=>({transform:v})),{duration,easing:'cubic-bezier(.2,.8,.2,1)',fill:'forwards'});
  a.onfinish=()=>resolve();
 });
}

function burst(){
 const r=card.getBoundingClientRect();
 for(let i=0;i<100;i++){
   let p=document.createElement('div');
   p.className='gold';
   document.body.appendChild(p);
   let side=Math.floor(Math.random()*4),x,y;
   if(side===0){x=r.left+Math.random()*r.width;y=r.top;}
   if(side===1){x=r.right;y=r.top+Math.random()*r.height;}
   if(side===2){x=r.left+Math.random()*r.width;y=r.bottom;}
   if(side===3){x=r.left;y=r.top+Math.random()*r.height;}
   p.style.left=x+'px'; p.style.top=y+'px';
   let ang=Math.random()*Math.PI*2;
   let dis=100+Math.random()*220;
   p.animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${Math.cos(ang)*dis}px,${Math.sin(ang)*dis}px)`,opacity:0}],{duration:1500,easing:'ease-out'});
   setTimeout(()=>p.remove(),1500);
 }
}

function goldRain(){
 const t=setInterval(()=>{
   for(let i=0;i<12;i++){
      let d=document.createElement('div');
      d.className='gold';
      d.style.left=Math.random()*window.innerWidth+'px';
      d.style.top='-10px';
      document.body.appendChild(d);
      d.animate([{transform:'translateY(0)',opacity:1},{transform:'translateY(700px)',opacity:0}],{duration:3000,easing:'linear'});
      setTimeout(()=>d.remove(),3000);
   }
 },100);
 setTimeout(()=>clearInterval(t),3000);
}
</script>
</body>
</html>
